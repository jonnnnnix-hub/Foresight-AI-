# FlowEdge Paper Trading Bots — Fly.io deployment
# Runs 4 concurrent scanners via supervisord in a single machine.
#
# Deploy:
#   fly deploy
#   fly secrets set POLYGON_API_KEY=xxx ALPACA_API_KEY_ID=xxx ...
#
# Monitor:
#   fly logs
#   fly ssh console -C "supervisorctl status"
#
# Scale:
#   fly scale memory 1024  (if bots need more RAM)

app = "flowedge-bots"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONPATH = "/app/src"
  PYTHONUNBUFFERED = "1"
  TZ = "America/New_York"

# Persistent volume for logs + cached data (backtest results, OPRA cache)
[mounts]
  source = "flowedge_data"
  destination = "/app/data"

# Background worker bots — no external HTTP traffic, no Fly proxy needed.
# Machine-level health check hits the internal healthcheck.py on :9090.
[checks]
  [checks.health]
    port = 9090
    type = "http"
    interval = "60s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024"
