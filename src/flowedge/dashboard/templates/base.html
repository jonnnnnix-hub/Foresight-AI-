<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FlowEdge Council{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'fe-dark': '#0f1117',
                        'fe-card': '#1a1d29',
                        'fe-border': '#2a2d3a',
                        'fe-accent': '#6366f1',
                        'fe-green': '#22c55e',
                        'fe-red': '#ef4444',
                        'fe-yellow': '#eab308',
                        'fe-blue': '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-fe-dark text-gray-200">
    <!-- Top Navigation -->
    <nav class="bg-fe-card border-b border-fe-border px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-white">
                <span class="text-fe-accent">FlowEdge</span> Council
            </h1>
            <span class="text-xs text-gray-500 bg-fe-dark px-2 py-0.5 rounded">v1.0</span>
        </div>
        <div class="flex items-center gap-6 text-sm">
            <a href="/" class="hover:text-fe-accent transition-colors {% block nav_dashboard %}{% endblock %}">Dashboard</a>
            <a href="/live" class="hover:text-fe-accent transition-colors {% block nav_live %}{% endblock %}">Live P&L</a>
            <a href="/history" class="hover:text-fe-accent transition-colors {% block nav_history %}{% endblock %}">History</a>
            <a href="/api/health" class="hover:text-fe-accent transition-colors">API</a>
        </div>
    </nav>

    <main class="max-w-[1440px] mx-auto px-6 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-fe-border px-6 py-3 text-center text-xs text-gray-600">
        FlowEdge Scalp v2 Council Review System &mdash; Post-Market Analysis
    </footer>

    <script src="/static/js/dashboard.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
