; ── Bot 7: ZEUS — 77 IBS reversion specialist ensemble (Account 4)
[program:zeus]
command=python scripts/run_specialist_scanner.py
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=10
stopwaitsecs=30
stdout_logfile=/app/data/live_logs/zeus/supervisor.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1",TZ="America/New_York"

; ── Health check HTTP server (for Fly.io) ────────────────────────
[program:healthcheck]
command=python deploy/healthcheck.py
directory=/app
autostart=true
autorestart=true
startretries=5
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"
priority=1

; ── Group: all bots ──────────────────────────────────────────────
[group:bots]
programs=scalp_v2,vol_scalp_v1,production,trident,lotto_yolo,lotto_prod,zeus
priority=10
