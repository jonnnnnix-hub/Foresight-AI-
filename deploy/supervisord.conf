[supervisord]
nodaemon=true
logfile=/app/data/live_logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
pidfile=/tmp/supervisord.pid
user=root

; ── Bot 1: Scalp v2 (Account 1) ─────────────────────────────────
[program:scalp_v2]
command=python scripts/run_scalp_v2_scanner.py
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=10
stopwaitsecs=30
stdout_logfile=/app/data/live_logs/scalp_v2/supervisor.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"

; ── Bot 2: Volume Scalper v1 (Account 1, same creds) ────────────
[program:vol_scalp_v1]
command=python scripts/run_volume_scalper.py
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=10
stopwaitsecs=30
stdout_logfile=/app/data/live_logs/vol_scalp_v1/supervisor.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"

; ── Bot 3: Production Scanner — precision/hybrid/rapid (Account 2)
[program:production]
command=python scripts/run_production_scanner.py
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=10
stopwaitsecs=30
stdout_logfile=/app/data/live_logs/production_supervisor.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"

; ── Bot 4: Trident ETF 0DTE (Account 3) ─────────────────────────
[program:trident]
command=python scripts/run_trident.py
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=10
stopwaitsecs=30
stdout_logfile=/app/data/live_logs/trident/supervisor.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"

; ── Health check HTTP server (for Fly.io) ────────────────────────
[program:healthcheck]
command=python deploy/healthcheck.py
directory=/app
autostart=true
autorestart=true
startretries=5
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"
priority=1

; ── Group: all bots ──────────────────────────────────────────────
[group:bots]
programs=scalp_v2,vol_scalp_v1,production,trident
priority=10
