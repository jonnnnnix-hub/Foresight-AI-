[supervisord]
nodaemon=true
logfile=/app/data/live_logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
pidfile=/tmp/supervisord.pid
user=root

; ── Bot 1: Scalp v2 (Account 1) ─────────────────────────────────
[program:scalp_v2]
command=python scripts/run_scalp_v2_scanner.py
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=10
stopwaitsecs=30
stdout_logfile=/app/data/live_logs/scalp_v2/supervisor.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"

; ── Bot 2: Volume Scalper v1 (Account 1, same creds) ────────────
[program:vol_scalp_v1]
command=python scripts/run_volume_scalper.py
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=10
stopwaitsecs=30
stdout_logfile=/app/data/live_logs/vol_scalp_v1/supervisor.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"

; ── Bot 3: Production Scanner — precision/hybrid/rapid (Account 2)
[program:production]
command=python scripts/run_production_scanner.py
