[supervisord]
nodaemon=true
logfile=/app/data/live_logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
pidfile=/tmp/supervisord.pid
user=root

; ── Unified Options: scalp_v2 + vol_scalp_v1 + production + trident
; Single process, ONE shared Polygon WebSocket, ONE shared ORATS cache.
; Accounts: 1 (scalp_v2 + vol_scalp), 2 (production), 3 (trident)
[program:unified_options]
command=python scripts/run_unified_options.py
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=10
stopwaitsecs=30
stdout_logfile=/app/data/live_logs/unified_options/supervisor.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"

; ── Bot 5: Lotto YOLO (Account 5) ───────────────────────────────
[program:lotto_yolo]
command=python scripts/run_lotto_yolo.py
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=10
stdout_logfile=/app/data/live_logs/lotto/yolo_supervisor.log
stdout_logfile_maxbytes=5MB
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"

; ── Bot 6: Lotto Production (Account 6) ─────────────────────────
[program:lotto_prod]
command=python scripts/run_lotto_prod.py
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=10
stdout_logfile=/app/data/live_logs/lotto/prod_supervisor.log
stdout_logfile_maxbytes=5MB
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"

; ── Bot 7: ZEUS — 77 IBS reversion specialist ensemble (Account 4)
[program:zeus]
command=python scripts/run_specialist_scanner.py
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=10
stopwaitsecs=30
stdout_logfile=/app/data/live_logs/zeus/supervisor.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1",TZ="America/New_York"

; ── Health check HTTP server (for Fly.io) ────────────────────────
[program:healthcheck]
command=python deploy/healthcheck.py
directory=/app
autostart=true
autorestart=true
startretries=5
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_redirect_stderr=true
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"
priority=1

; ── Group: all bots ──────────────────────────────────────────────
[group:bots]
programs=unified_options,lotto_yolo,lotto_prod,zeus
priority=10
